<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Dark Mode</title>
    <style>
        /* 1. Standaard CSS Variabelen (Light Mode) */
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --accent-color: #0076ff;
        }

        /* 2. Automatische Dark Mode (als de gebruiker dit heeft ingesteld) */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #f5f5f5;
                --accent-color: #38bdf8;
            }
        }

        /* 3. Styling van de pagina */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.3s ease, color 0.3s ease; /* Zorgt voor een vloeiende overgang */
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            color: var(--accent-color);
            font-size: 1.2rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello World</h1>
        <p>Welkom op mijn website met automatische dark mode!</p>
    </div>

</body>
</html>
