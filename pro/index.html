<!DOCTYPE html>
<html lang="nl">
    <head>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Hello World - Dark Mode Toggle</title>
    </head>
    <body>
        <div class="container">
            <h1>Hello World</h1>
            <p>Welkom op mijn website met een dark mode toggle!</p>
            <button id="toggle-theme" onclick="setTheme('system')">system</button>
            <button id="toggle-theme" onclick="setTheme('light')">light</button>
            <button id="toggle-theme" onclick="setTheme('dark')">dark</button>
        </div>
        <script src="applytheme.js"></script>
</html>
