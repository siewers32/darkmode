<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Dark Mode Toggle</title>
    <style>
        /* 1. Standaard CSS Variabelen (Licht Thema) */
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --accent-color: #0076ff;
            --btn-bg: #f0f0f0;
            --btn-text: #333333;
        }

        /* 2. Systeem Dark Mode (Automatisch via media query) */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #f5f5f5;
                --accent-color: #38bdf8;
                --btn-bg: #2a2a2a;
                --btn-text: #f5f5f5;
            }
        }

        /* 3. Handmatige Overrides (Als JavaScript een specifiek thema dwingt) */
        html[data-theme="light"] {
            --bg-color: #ffffff;
            --text-color: #333333;
            --accent-color: #0076ff;
            --btn-bg: #f0f0f0;
            --btn-text: #333333;
        }

        html[data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #f5f5f5;
            --accent-color: #38bdf8;
            --btn-bg: #2a2a2a;
            --btn-text: #f5f5f5;
        }

        /* 4. Styling van de pagina */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            color: var(--accent-color);
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 30px;
        }

        /* De Schakelknop */
        .toggle-btn {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: 1px solid transparent;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .toggle-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello World</h1>
        <p>Schakel tussen licht, donker of automatisch!</p>
        
        <!-- De Knop -->
        <button class="toggle-btn" id="themeToggle">Thema: Systeem</button>
    </div>

    <script>
        const toggleBtn = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;

        // We houden de status bij: 'system', 'light', of 'dark'
        let currentTheme = 'system'; 

        toggleBtn.addEventListener('click', () => {
            if (currentTheme === 'system') {
                // Stap 1: Ga van Systeem naar geforceerd Licht
                currentTheme = 'light';
                htmlElement.setAttribute('data-theme', 'light');
                toggleBtn.textContent = 'Thema: Licht ☀️';
            } else if (currentTheme === 'light') {
                // Stap 2: Ga van Licht naar geforceerd Donker
                currentTheme = 'dark';
                htmlElement.setAttribute('data-theme', 'dark');
                toggleBtn.textContent = 'Thema: Donker 🌙';
            } else {
                // Stap 3: Ga terug naar de automatische Systeemvoorkeur
                currentTheme = 'system';
                htmlElement.removeAttribute('data-theme'); // Verwijdert de override, CSS media query neemt het weer over
                toggleBtn.textContent = 'Thema: Systeem 💻';
            }
        });
    </script>

</body>
</html>
